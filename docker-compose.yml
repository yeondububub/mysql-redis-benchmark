version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: benchmark-mysql
    environment:
      MYSQL_DATABASE: benchmark_db
      MYSQL_USER: benchmark_user
      MYSQL_PASSWORD: benchmark_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:alpine
    container_name: benchmark-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: